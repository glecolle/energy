        }
        .graph-container {
            min-width: 0;
        }
        .graph-title {
            margin-bottom: 10px;
            color: #333;
        }
        .graph-canvas {
            position: relative;
            height: 350px;
        }
        .graph-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
        }
        .graph-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.78em;
        }
        .graph-legend-swatch {
            display: inline-block;
            width: 24px;
            height: 12px;
            margin-right: 2px;
        }
        .graph-legend-swatch.dash {
            background-color: transparent;
            border-top: 12px dotted currentColor;
            height: 0;
        }
        .section-title {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }
        .table-annual {
            margin-bottom: 30px;
        }
        .header-group {
            text-align: center;
            background-color: #e9ecef;
        }
        .header-detail {
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Énergie</h1>
        <div id="graphs"></div>
        <div id="tables"></div>
    </div>

    <script>
        class DataSet {
            months;
            years;
        }

        /**
         * Metric hold data for a value model and is the aggregation of many records.
         * Some additional values are computed for convenience
         */
        class Metric {
            constants; // prices, surface...
            total; // current value of metric
            totalRaw; // raw value before conversion
            days; // number of days of aggregation
            samples; // number of samples
            info; // raw information, for tooltip
            price; // prix en fonction du cours
            byDay; // per day
            unit;

            constructor(constants, valueModel) {
                this.constants = constants;
                this.total = 0;
                this.days = 0;
                this.samples = 0;
                this.price = 0;
                this.totalRaw = 0;
                this.byDay = 0;
                this.info = "";
                this.unit = valueModel.unit;
            }

            update() {
                this.byDay = this.total / this.days;
                this.info = `${Math.round(this.totalRaw*10)/10} ${this.unit}`;
            }

            add(metric) {
                this.constants = metric.constants;
                this.total += metric.total;
                this.totalRaw += metric.totalRaw;
                this.days += metric.days;
                this.samples += 1;
                this.price += metric.price;

                this.update();
            }

            remove(metric) {
                this.total -= metric.total;
                this.totalRaw -= metric.totalRaw;
                this.days -= metric.days;
                this.price -= metric.price;
                this.update();
            }
        }

        /**
         * TimeSpan represents a time period and many associated metrics.
         * Timespans a usualy used for months and years.
         */
        class TimeSpan {
            constants;
            name;
            date;
            metrics; // {valeur1: Metric, valeur2: Metric}
            samples;

            constructor(name, date, constants) {
                this.name = name;
                this.date = date;
                this.metrics = {};
                this.constants = constants;
                this.days = 0;
            }

            addRecord (record, previous, name, valueModel) {
                let m = new Metric(record.constants, valueModel);

                // copy constant to record, no override
                for(const[constantName, constantValue] of Object.entries(record.constants)) {
                    if (typeof record[constantName] == "undefined") {
                        record[constantName] = record.constants[constantName];
                    }
                }

                // aggregation rule depends on value model type
                if (valueModel.type === "value") {
                    // measure for this time period
                    if (typeof record[name] == "undefined") {
                        fail(`missing property named ${name} on record ${record.date}`);
                    }
                    m.totalRaw = record[name];
                } else if (valueModel.type === "index") {
                    // increasing counter
                    const nameIndex = name+"_index";

                    if (typeof record[name] == "undefined") {
                        fail(`missing property named ${name} on record ${record.date}`);
                    }
                    let value;
                    let previousValue;
                    if (typeof record[name+"_init"] != "undefined") {
                        previousValue = record[name+"_init"];
                    } else {
                        if (!previous) {
                            fail(`missing previous record for ${record.date} when looking for value ${name}`);
                        }
                        if (typeof previous[nameIndex] !== "undefined") {
                            previousValue = previous[nameIndex];
                        } else if (typeof previous[name] !== "undefined") {
                             previousValue = previous[name];
                        } else {
                            fail(`missing ${name} in previous record for ${record.date}`);
                        }
                    }
                    value = record[name] - previousValue;
                    record[nameIndex] = record[name]; // save for calculations
                    record[name] = value;
                    if (value < 0) {
                        fail(`delta value calculated from index cannot be negative, got ${value} for ${name} on record ${record.date}`);
                    }
                    m.totalRaw = value;
                } else if (valueModel.type == "calc") {
                    // simple computation with data from this record
                    let value = Energy.calc(record, valueModel.formula);
                    record[name] = value; // save for future use
                    m.totalRaw = value;
                } else if (valueModel.type == "reg") {
                    // perform a regression on a yearly basis, this is done later when all data are aggregated
                }
                m.days = (record.end.getTime() - previous.end.getTime()) / 86400000;

                m.info = `${m.totalRaw} ${valueModel.unit}`;
                m.samples++;
                m.total = m.totalRaw * (typeof valueModel.tokWh != "undefined" ? valueModel.tokWh : 1);

                m.constants = record.constants;
                m.update();

                this.days = m.days;
                this.metrics[name] = m;
            }

            add(timeSpan) {
                for (const [name, metric] of Object.entries(timeSpan.metrics)) {
                    if (!this.metrics[name]) {
                        this.metrics[name] = new Metric(timeSpan.constants, metric);
                    }
                    this.metrics[name].add(metric);
                }

                this.days += timeSpan.days;
            }

            calc(valueName, valueModel) {
                this.metrics[valueName].total = Energy.calc(this, valueModel.formula);
                this.metrics[valueName].update();
            }
        }

        /** A Term is a variable multiplied by a coefficient */
        class Term {
            label;
            coefficient;

            constructor(label, coefficient) {
                if (typeof label != "string") {
                    fail(`wrong string label for Term, got: ${label}`);
                }
                if (typeof coefficient != "number" || Number.isNaN(coefficient)) {
                    fail(`wrong number coefficient for Term '${label}', got: ${coefficient}`);
                }
                this.label = label ? label : false; // false means no value to multiply, so that coefficient is actually a constant
                this.coefficient = coefficient;
            }

            calc(timeSpan) {
                if (this.label) {
                    if (!timeSpan.metrics[this.label] || typeof timeSpan.metrics[this.label].total != "number") {
                        fail(`missing metric '${this.label}' for calculation in: ${JSON.stringify(timeSpan)}`);
                    }
                    return timeSpan.metrics[this.label].total * this.coefficient;
                } else {
                    //assume coefficient is a constant
                    return this.coefficient;
                }
            }
        }

        /** An Expression is a sum of terms */
        class Expression {
            terms;
            positive;

            constructor(labels, coefficients, positive) {
                this.positive = !!positive;
                if (labels.length != coefficients.length-1) {
                    fail(`Expression cannot be built with ${labels.length} and ${coefficients.length} coefficients`);
                }

                this.terms = [];
                labels.forEach((l,i) => {
                    this.terms.push(new Term(l, coefficients.shift())); // variable name and its coefficient
                });

                this.terms.push(new Term("", coefficients.shift())); // constant with an empty variable name
            }

            calc(timeSpan) {
                let result = 0;
                this.terms.forEach(t => {
                    result += t.calc(timeSpan);
                });

                if (this.positive) {
                    return Math.max(0, result);
                } else {
                    return result;
                }
            }
        }

        /**
         * Energy is the main class for this tool, it validates, prepares and draws the results.
         */
        class Energy {
            values;
            records;
            graphs;
            tables;
            dataSet;

            constructor(records, values, graphs, tables) {
                this.records = records;
                this.values = values;
                this.graphs = graphs;
                this.tables = tables;
                this.dataSet = null;
            }

            static validateModel(valueModel, name) {
                if (typeof valueModel.name != "string") {
                    fail(`missing name for ${name}`);
                }
                if (typeof valueModel.unit != "string") {
                    fail(`missing unit for ${name}`);
                }
                if (typeof valueModel.type != "string") {
                    fail(`missing type for ${name}`);
                }
                if (!/^(value|index|calc|reg)$/.test(valueModel.type)) {
                    fail(`wrong type for ${name}, got ${valueModel.type}`);
                }
                if (valueModel.type == "reg") {
                    if (typeof valueModel.formula != "string") {
                        fail(`missing formula for ${name}, required for ${valueModel.type} type`);
                    }

                    valueModel.formula = valueModel.formula.replace(/\s+/g, ""); // remove spaces
                    if (!/^\w+=[A-Z]+\*\w+(\+[A-Z]+\*\w+)*(\+[A-Z]+)$/.test(valueModel.formula)) {
                        fail(`wrong formula for regression on: ${name}, got: ${valueModel.formula}, expect target=A*value+B*other_value+C with any number of values and capital letters are the name of constants to fit to dataset`);
                    }
                }

                if (valueModel.type == "calc") {
                    if (typeof valueModel.formula != "string") {
                        fail(`missing formula for ${name}, required for ${valueModel.type} type`);
                    }
                    if (/^[\(\)]*\w([-+*/]\w+[\(\)]*)+$/.test(valueModel.formula)) {
                        fail(`wrong formula format for ${name} with type ${valueModel.type}, got: ${valueModel.formula} expected (var_a+var_b)-var_c*var_d`);
                    }
                }
            }

            /** Prepare data for graphs an tables.
             * This is done in several steps:
             * - compute index type to actual values
             * - compute calc type values
             * - aggregate data by months and years
             * - compute reg values on the whole data set to fit coefficients
             * @return a DataSet containing aggregated data by months and years
             */
            prepare() {
                let orderedRecords = [];
                let lastConstants = {};

                for (const [name, valueModel] of Object.entries(this.values)) {
                    Energy.validateModel(valueModel, name);
                }

                for (let i = this.records.length-1; i >= 0 ; i--) {
                    if (typeof this.records[i].date === "undefined") {
                        let newConstants = JSON.parse(JSON.stringify(this.records[i]));
                        for (const [k, v] of Object.entries(lastConstants)) {
                            if (typeof newConstants[k] === "undefined") {
                                newConstants[k] = v;
                            }
                        }
                        lastConstants = newConstants;
                    } else {
                        this.records[i].constants = lastConstants;
                        this.records[i].end = new Date(this.records[i].date);
                        orderedRecords.push(this.records[i]);
                    }
                }

                //console.log("orderedRecords", orderedRecords);

                // build list of months
                let months = [];
                for (let i = 1; i < orderedRecords.length; i++) {
                    let date = new Date(orderedRecords[i].date);
                    date.setMonth(date.getMonth()-1);

                    let currentYear = date.getFullYear();

                    let ts = new TimeSpan(`${currentYear}-${(date.getMonth()+1).toLocaleString('fr-FR', {minimumIntegerDigits: 2})}`, date, orderedRecords[i].constants);

                    for (const [key, conf] of Object.entries(this.values)) {
                        ts.addRecord(orderedRecords[i], orderedRecords[i-1], key, conf);
                    }

                    months.push(ts);
                }

                // build list of years
                let years = {};
                let lastFullYear = null;
                for (let i=0; i < months.length; i++) {
                    let year = months[i].date.getFullYear();
                    let ts;

                    if (!years[year]) {
                        ts = new TimeSpan(`${months[i].date.getFullYear()}`, months[i].date, months[i].constants);
                        years[year] = ts;
                    } else {
                        ts = years[year];
                    }
                    ts.add(months[i]);

                    if (ts.days >= 365) {
                        lastFullYear = year;
                    }
                }
                console.log("last full year", lastFullYear);

                // recompute calc values of years since calc values may not be calculated correctly this way (ratios, by example, cannot be added and neeed to be recomputed on year aggregation level)
                for (const [year, ts] of Object.entries(years)) {
                    for (const [valueName, valueModel] of Object.entries(this.values)) {
                        if (valueModel.type === "calc") {
                            ts.calc(valueName, valueModel);
                        }
                    }
                }

                // find the last full year to cumpute regression factors (or maybe another year choosen by user?)
                let dataPerMonth = [];
                for (let i=0; i < months.length; i++) {
                    if (months[i].name.substring(0,4) != lastFullYear) {
                        continue;
                    }

                    dataPerMonth.push(months[i]);
                }

                // linear regression for each variable of type reg
                for (const [name, valueModel] of Object.entries(this.values)) {
                    if (valueModel.type != "reg") {
                        continue;
                    }

                    let parts = valueModel.formula.split(/[=+*A-Z\s]+/); // split by operators and constants
                    parts = parts.filter(p => p.length > 0);

                    let target = parts.shift();
                    let labels = parts;
                    //console.log("linear regression on", lastFullYear, "formula:", valueModel.formula, "target:", target, "labels:", labels);

                    let inputs = [];
                    let targetValues = [];
                    dataPerMonth.forEach((m, i) => {
                        if (valueModel.positive && m.metrics[target].total <= 0.001) {
                            return; // ignore negative values for linear regression training
                        }
                        targetValues.push(m.metrics[target].total);
                        const rank = targetValues.length-1;

                        if (!inputs[rank]) {
                            inputs.push({});
                        }
                        labels.forEach(l => {
                            if (!m.metrics[l]) {
                                fail(`missing metric ${l} on: ${m.name}`);
                            }
                            inputs[rank][l] = m.metrics[l].total;
                        });
                        if (!m.metrics[target]) {
                            fail(`missing target metric ${target} on: ${m.name}`);
                        }
                    });

                    let lr = Energy.linearRegression(targetValues, inputs, labels);
                    //console.log("linear regression coefficients:", lr, "for labels:", labels);

                    valueModel.expression = new Expression(labels, lr, valueModel.positive);

                    // compute estimated values, both on months and years
                    months.forEach(ts => {
                        ts.metrics[name].total = valueModel.expression.calc(ts);
                    });
                    for (const [year, ts] of Object.entries(years)) {
                        ts.metrics[name].total = valueModel.expression.calc(ts);
                    }
                }

                this.dataSet = new DataSet();
                this.dataSet.months = months;
                this.dataSet.years = years;
                return this.dataSet;
            }

             /**
             * Compute the linear regression to best match targets from inputs on provided inputs.
             * The forumula is assumed to be for each item: target = A*inputs[label1] + B*inputs[label2] + ... + Z
             * Where A, B, ... are coefficients and Z is a constant
             * @param targets array of numbers containing the target values to match
             * @param inputs array of objects containing raw values
             * @param labels array of properties to use from inputs
             * @return an array of the coefficients [A, B, ... , Z] (this array has the same number of items than labels + 1 for the constant)
             */
            static linearRegression(targets, inputs, labels) {
                // check inputs
                const n = targets.length;
                const k = labels.length;
                const m = inputs.length;

                if (m != n) {
                    fail(`cannot perform linear regression, targets and inputs do not have same lengths: ${n} targets and ${m} inputs`);
                }
                targets.forEach(v => {
                    if (typeof v != "number" || Number.isNaN(v)) {
                        fail(`on linear regression, on of the target values is not a number, got: ${v}`);
                    }
                });
                labels.forEach(l => {
                    if (typeof l != "string") {
                        fail(`on linear regression, labels must be strings, got: ${l}`);
                    }
                    inputs.forEach(input => {
                        if (typeof input[l] != "number" || Number.isNaN(input[l])) {
                            fail(`on linear regression, missing or wrong input for label ${l}, got: ${input[l]}`);
                        }
                    });
                });

                // construct matrix X (n x (k+1)) and vector y (n x 1)
                // X contains input values with a column of 1s for the constant term
                const X = [];
                const y = targets;

                for (let i = 0; i < n; i++) {
                    const row = [];
                    for (let j = 0; j < k; j++) {
                        row.push(inputs[i][labels[j]] || 0);
                    }
                    row.push(1); // constant term
                    X.push(row);
                }

                // compute X^T * X
                const XtX = [];
                for (let i = 0; i < k + 1; i++) {
                    XtX[i] = [];
                    for (let j = 0; j < k + 1; j++) {
                        let sum = 0;
                        for (let row = 0; row < n; row++) {
                            sum += X[row][i] * X[row][j];
                        }
                        XtX[i][j] = sum;
                    }
                }

                // compute X^T * y
                const Xty = [];
                for (let i = 0; i < k + 1; i++) {
                    let sum = 0;
                    for (let row = 0; row < n; row++) {
                        sum += X[row][i] * y[row];
                    }
                    Xty[i] = sum;
                }

                // solve (X^T * X) * beta = X^T * y using Gaussian elimination
                const augmented = XtX.map((row, i) => [...row, Xty[i]]);

                // forward elimination
                for (let i = 0; i < k + 1; i++) {
                    // find pivot
                    let maxRow = i;
                    for (let row = i + 1; row < k + 1; row++) {
                        if (Math.abs(augmented[row][i]) > Math.abs(augmented[maxRow][i])) {
                            maxRow = row;
                        }
                    }

                    // swap rows
                    [augmented[i], augmented[maxRow]] = [augmented[maxRow], augmented[i]];

                    if (Math.abs(augmented[i][i]) < 1e-10) {
                        fail(`linear regression failed: singular matrix — input "${labels[i] ?? 'constant'}" is constant or collinear with another input`);
                    }

                    // eliminate column
                    for (let row = i + 1; row < k + 1; row++) {
                        const factor = augmented[row][i] / augmented[i][i];
                        for (let col = i; col < k + 2; col++) {
                            augmented[row][col] -= factor * augmented[i][col];
                        }
                    }
                }

                // back substitution
                const beta = new Array(k + 1);
                for (let i = k; i >= 0; i--) {
                    beta[i] = augmented[i][k + 1];
                    for (let j = i + 1; j < k + 1; j++) {
                        beta[i] -= augmented[i][j] * beta[j];
                    }
                    beta[i] /= augmented[i][i];
                }

                // return coefficients for each label plus constant at the end
                return beta;
            }

            /**
             * Compute the value for a record based on a formula.
             * @param record contains the input values named in the formula (the input values are properties of the record, an Error is thrown if the property is missing)
             * @param formula a string decribing the computation to perform like "heat_peak+ heat_off_peak" or "water + 2 * heat / surface"
             * @return the computed value
             */
            static calc(record, formula) {
                const tokens = formula.match(/[a-zA-Z_][a-zA-Z0-9_]*|\d+\.?\d*|[+\-*\/()]/g) || [];
                let pos = 0;

                function peek() { return tokens[pos]; }
                function consume() { return tokens[pos++]; }

                function parseExpr() { return parseAddSub(); }

                function parseAddSub() {
                    let left = parseMulDiv();
                    while (peek() === '+' || peek() === '-') {
                        const op = consume();
                        const right = parseMulDiv();
                        left = op === '+' ? left + right : left - right;
                    }
                    return left;
                }

                function parseMulDiv() {
                    let left = parsePrimary();
                    while (peek() === '*' || peek() === '/') {
                        const op = consume();
                        const right = parsePrimary();
                        left = op === '*' ? left * right : left / right;
                    }
                    return left;
                }

                function parsePrimary() {
                    const token = peek();
                    if (token === '-') {
                        consume();
                        return -parsePrimary();
                    }
                    if (token === '(') {
                        consume();
                        const val = parseExpr();
                        consume(); // ')'
                        return val;
                    }
                    if (/^[a-zA-Z_]/.test(token)) {
                        consume();
                        // manage direct records or TimeSpan structure
                        if (token in record) {
                            return record[token];
                        } else if ("constants" in record && token in record.constants) {
                            return record.constants[token];
                        } else if ("metrics" in record && token in record.metrics) {
                            return record.metrics[token].total;
                        }
                        fail(`calc: missing property "${token}" in record: ${JSON.stringify(record)}`);
                    }
                    if (/^\d/.test(token)) {
                        consume();
                        return parseFloat(token);
                    }
                    fail(`calc: unexpected token "${token}" in formula "${formula}"`);
                }

                return parseExpr();
            }

            drawGraphs() {
                let parentId = "graphs";
                document.getElementById(parentId).innerHTML = "";
                this.graphs.forEach(g => {
                    this.drawGraph(parentId, g, this.values, g.timeUnit == "year" ? this.dataSet.years : this.dataSet.months);
                });
            }

            /**
             * Draw a graph using chart.js
             * On top, there is the title.
             * Below, there a legend showing the series with their colors.
             * Below, the graph panel with the requested series.
             * @param parentId add the graph inside this element
             * @param graphModel the properties of the graph to display: {title: "Annual evolution", unit: "kWh", name: "Consumption", series: ["total", "chauf_elec", "ecs_hc", "divers_elec", "bois", "chauf_reg"], width: "50%", timeUnit: "year"}
             * series contains the list of names of metrics to display. For each serie, display the total value of the metric.
             * @param valueModels describes values, used for its color and dash properties for drawing series
             * @param timeSpans are all timeSpans to use, containing the metrics for all variables
             */
            drawGraph(parentId, graphModel, valueModels, timeSpans) {
                const parent = document.getElementById(parentId);

                const wrapper = document.createElement('div');
                wrapper.className = 'graph-container';
                wrapper.style.flex = graphModel.width ? `0 0 calc(${graphModel.width} - 10px)` : '1 1 100%';

                // Title
                const title = document.createElement('h3');
                title.className = 'graph-title';
                title.textContent = graphModel.title;
                wrapper.appendChild(title);

                // Legend
                const legend = document.createElement('div');
                legend.className = 'graph-legend';
                graphModel.series.forEach(serieName => {
                    const model = valueModels[serieName];
                    if (!model) return;
                    const color = model.color || '#6c757d';

                    const item = document.createElement('span');
                    item.className = 'graph-legend-item';

                    const swatch = document.createElement('span');
                    swatch.className = 'graph-legend-swatch' + (model.dash ? ' dash' : '');
                    if (model.dash) {
                        swatch.style.color = color; // drives currentColor for the dashed outline
                    } else {
                        swatch.style.backgroundColor = color;
                    }
                    item.appendChild(swatch);

                    const label = document.createElement('span');
                    label.textContent = model.name;
                    item.appendChild(label);
                    legend.appendChild(item);
                });
                wrapper.appendChild(legend);

                // Canvas wrapped in a fixed-height container (required by Chart.js responsive mode)
                const canvasWrapper = document.createElement('div');
                canvasWrapper.className = 'graph-canvas';
                const canvas = document.createElement('canvas');
                canvasWrapper.appendChild(canvas);
                wrapper.appendChild(canvasWrapper);

                parent.appendChild(wrapper);

                // Prepare sorted time spans and labels
                let labels, sortedTimeSpans;
                if (Array.isArray(timeSpans)) {
                    sortedTimeSpans = timeSpans;
                    labels = sortedTimeSpans.map(ts => ts.name);
                } else {
                    const keys = Object.keys(timeSpans).sort();
                    sortedTimeSpans = keys.map(k => timeSpans[k]);
                    labels = keys;
                }

                // Build Chart.js datasets
                const datasets = graphModel.series
                    .filter(serieName => valueModels[serieName])
                    .map(serieName => {
                        const model = valueModels[serieName];
                        const color = model.color || '#6c757d';
                        const dataset = {
                            label: model.name,
                            data: sortedTimeSpans.map(ts => ts.metrics[serieName] ? ts.metrics[serieName].total : 0),
                            borderColor: color,
                            backgroundColor: color,
                            borderWidth: 2,
                            fill: false,
                            pointRadius: 0
                        };
                        if (model.dash) {
                            dataset.borderDash = [5, 5];
                        }
                        return dataset;
                    });

                new Chart(canvas.getContext('2d'), {
                    type: 'line',
                    data: {labels, datasets},
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {display: true, text: graphModel.unit}
                            },
                            x: {
                                title: {display: true, text: graphModel.timeUnit === 'year' ? 'Année' : 'Mois'}
                            }
                        },
                        plugins: {
                            legend: {display: false},
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                callbacks: {

            drawTables() {

                this.tables.forEach(t => {

            /**
             * Draw a table based on data and table model.
             * On top, there is the table title.
             * Below, there a table containing 2 headers lines, the first on with the group name and the second one containing the metric name.
             * Each row contains teh data from one TimeSpan.
             * Each cell contains the data of a metric as decribed in the model. The total of the metric is displayed in the cell and the info is displayed as a tooltip.
             * Values are displayed as integers, except when smaller that 100, in that case, 3 digits are displayed at most.
             * @param parentId add the table inside this element
             * @param graphModel the properties of the graph to display:
             * {title: "Récapitulatif annuel", groups: [
                    {
                        name: "Total",
                        columns: [
                            {name: "kWh", metric: "total"},
                            {name: "kWh/m²", metric: "energie_surface"},
                        ]
                    },
                    {
                        name: "Chauffage",
                        columns: [
                            {name: "kWh", metric: "chauf"},
                            {name: "kWh/m²", metric: "chauf_surface"},
                        ]
                    },
                ]}
                * @param timeSpans are all timeSpans to use, containing the metrics for all variables
                */
            drawTable(parentId, tableModel, timeSpans) {
                const parent = document.getElementById(parentId);

                // Title
                const title = document.createElement('h3');
                title.className = 'section-title';
                title.textContent = tableModel.title;
                parent.appendChild(title);

                const table = document.createElement('table');
                table.className = 'table-annual';

                // Header row 1: period label + group names spanning their columns
                const thead = document.createElement('thead');
                const headerRow1 = document.createElement('tr');

                const thPeriod = document.createElement('th');
                thPeriod.textContent = 'Période';
                thPeriod.rowSpan = 2;
                headerRow1.appendChild(thPeriod);

                for (const group of tableModel.groups) {
                    const th = document.createElement('th');
                    th.textContent = group.name;
                    th.className = 'header-group';
                    th.colSpan = group.columns.length;
                    headerRow1.appendChild(th);
                }

                // Header row 2: column names
                const headerRow2 = document.createElement('tr');
                for (const group of tableModel.groups) {
                    for (const col of group.columns) {
                        const th = document.createElement('th');
                        th.textContent = col.name;
                        th.title = col.tooltip ?? "";
                        th.className = 'numeric header-detail';
                        headerRow2.appendChild(th);
                    }
                }

                thead.appendChild(headerRow1);
                thead.appendChild(headerRow2);
                table.appendChild(thead);

                // Data rows, most recent first
                const tbody = document.createElement('tbody');
                const sortedTimeSpans = Array.isArray(timeSpans)
                    ? [...timeSpans].reverse()
                    : Object.keys(timeSpans).sort().reverse().map(k => timeSpans[k]);

                for (const ts of sortedTimeSpans) {
                    const row = document.createElement('tr');

                    const tdPeriod = document.createElement('td');
                    tdPeriod.textContent = ts.name;
                    row.appendChild(tdPeriod);

                    for (const group of tableModel.groups) {
                        for (const col of group.columns) {
                            const td = document.createElement('td');
                            td.className = 'numeric';
                            const metric = ts.metrics[col.metric];
                            if (metric) {
                                const v = metric.total;
                                if (typeof v != "number" || Number.isNaN(v)) {
                                    console.error(`while drawing cell, got invalid value for ${col.metric} in metric: ${JSON.stringify(metric)}`);
                                }
                                td.textContent = Math.abs(v) >= 100
                                    ? Math.round(v).toString()
                                    : parseFloat(v.toPrecision(3)).toString();
                                if (metric.info) {
                                    td.title = metric.info;
                                }
                            } else {
                                td.textContent = '-';
                            }
                            row.appendChild(td);
                        }
                    }

                    tbody.appendChild(row);
                }

                table.appendChild(tbody);
                parent.appendChild(table);

                Energy.addTableGradients(table, "#eaeaea");
            }

            /**
             * addTableGradients updates a table to add cell gradient.
             * For each column of tbody (except the first one), evaluate the min and max values and then add a CSS gradient reflecting the cell value.
             * The gradient is the given color on the right and there is a transition to transparency to the left.
             * The threshold of transparency is aligned to the right when the value is close to the min and aligned to the left when the value is close to the max.
             * @param table Element
             * @param color base color
             */
            static addTableGradients(table, color) {
                const rows = Array.from(table.tBodies[0].rows);
                if (rows.length === 0) return;

                const colCount = rows[0].cells.length;

                for (let col = 1; col < colCount; col++) {
                    const values = rows.map(row => parseFloat(row.cells[col]?.textContent));
                    const numericValues = values.filter(v => !isNaN(v));
                    if (numericValues.length === 0) continue;

                    const min = Math.min(...numericValues);
                    const max = Math.max(...numericValues);
                    const range = max - min;

                    rows.forEach(row => {
                        const cell = row.cells[col];
                        if (!cell) return;
                        const v = parseFloat(cell.textContent);
                        if (isNaN(v)) return;

                        const stop = range === 0 ? 0 : Math.round(100 * (1 - (v - min) / range));
                        const transitionEnd = Math.min(stop + 4, 100);
                        cell.style.background = `linear-gradient(to right, transparent ${stop}%, ${color} ${transitionEnd}%)`;
                    });
                }
            }

            static testCalc() {
                let record = {heating: 2.1, water: 5, other: 3.5, total: 10, surface: 35, zero: 0};
                let formula = "heating + water+other";
                let failed = null;
                let v = Energy.calc(record, formula);
                if (v !== 2.1+5+3.5) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "(heating + water+other)";
                v = Energy.calc(record, formula);
                if (v !== 2.1+5+3.5) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "heating + other /2";
                v = Energy.calc(record, formula);
                if (v !== 2.1+3.5/2) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "heating + water +other/surface";
                v = Energy.calc(record, formula);
                if (v !== 2.1+5+3.5/35) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "total - heating -water";
                v = Energy.calc(record, formula);
                if (v !== 10 - 2.1 - 5) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "water / total";
                v = Energy.calc(record, formula);
                if (v !== 5/10) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "(heating + water +other)/surface";
                v = Energy.calc(record, formula);
                if (v !== (2.1+5+3.5)/35) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "heating / zero";
                v = Energy.calc(record, formula);
                if (v !== Infinity) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                formula = "zero / heating";
                v = Energy.calc(record, formula);
                if (v !== 0) {
                    fail(`calc returned ${v} for ${formula}`);
                }

                // calc can also fetch data within a TimeSpan object (for year aggregation level)
                let timeSpan = new TimeSpan("20226", new Date(), {surface: 100});
                timeSpan.metrics.heating = {total: 238, unit: "kWh/m²"};
                formula = "heating / surface";
                v = Energy.calc(timeSpan, formula);

                   fail(`calc returned ${v} for ${formula}`);
                }

                formula = "heating + water + missing";
                try {
                    Energy.calc(record, formula);
                    failed = `calc should have thrown an error for missing property`;
                } catch(err) {
                }

                formula = "heating + water + ";
                try {
                    Energy.calc(record, formula);
                    failed = `calc should have thrown an error for invalid formula with missing operand`;
                } catch(err) {
                }

                formula = "heating + *";
                try {
                    Energy.calc(record, formula);
                    failed = `calc should have thrown an error for invalid formula with missing operand`;
                } catch(err) {
                }
            }

        /** assertEquals checks an equality of fails if comparaison is not verified. */
        function assertEquals(value, expected, testName) {
            let ok = false;
            //console.log("assert ", value, "=", expected, "for test:", testName);
            switch (typeof expected) {
                case "string":
                case "bool":
                    ok = value === expected;
                    break;
                case "number":
                    if (typeof value === "number") {
                        ok = (Number.isNaN(expected) && Number.isNaN(value)) || value === expected || (Math.abs(Math.round(value*100) - Math.round(expected*100)) <= 1);
                    } else {
                        ok = false;
                    }
                    break;
                case "object":
                    ok = JSON.stringify(value) === JSON.stringify(expected);
                    break;
            }
            if (!ok) {
                fail(`test error: expected '${expected}', got '${value}' on test: ${testName}`);
            }
        }

        /** fail is called when a critical failure has occured */
        function fail(message) {
            throw new Error(message);
        }
