            <canvas id="graphiqueAnnuel" style="max-height: 400px;"></canvas>
        </div>
        <div id="bilans"></div>
    </div>

    <script>
        function calculerConsommation(valeurActuelle, valeurPrecedente, type, config, releveActuel, relevePrecedent, totauxAnnuels, annee) {
            if (valeurPrecedente === undefined || valeurActuelle === undefined) {
                return 0;
            }

            if (Array.isArray(type)) {
                // Type est un tableau : calculer la différence entre le total et les valeurs à retrancher
                const cleTotal = config.total;
                if (!cleTotal || !desc.valeurs[cleTotal]) {
                    return 0;
                }

                // Si on est dans le contexte des totaux annuels, utiliser les totaux précalculés
                if (totauxAnnuels && annee) {
                    const totalRef = totauxAnnuels[annee][cleTotal] || 0;
                    let totalARetrancher = 0;
                    for (const cleARetrancher of type) {
                        totalARetrancher += totauxAnnuels[annee][cleARetrancher] || 0;
                    }
                    return totalRef - totalARetrancher;
                } else {
                    // Calcul mensuel : calculer la consommation du total puis retrancher les autres
                    const configTotal = desc.valeurs[cleTotal];
                    let consoTotal = 0;

                    if (configTotal.hc) {
                        const valActTotalHC = releveActuel[cleTotal + '_hc'] || 0;
                        const valActTotalHP = releveActuel[cleTotal + '_hp'] || 0;
                        const valPrecTotalHC = relevePrecedent[cleTotal + '_hc'] || 0;
                        const valPrecTotalHP = relevePrecedent[cleTotal + '_hp'] || 0;

                        const consoHC = calculerConsommationBasique(valActTotalHC, valPrecTotalHC, configTotal.type);
                        const consoHP = calculerConsommationBasique(valActTotalHP, valPrecTotalHP, configTotal.type);
                        consoTotal = (consoHC + consoHP) * (configTotal.tokWh || 1);
                    } else {
                        const valActTotal = releveActuel[cleTotal] || 0;
                        const valPrecTotal = relevePrecedent[cleTotal] || 0;
                        consoTotal = calculerConsommationBasique(valActTotal, valPrecTotal, configTotal.type) * (configTotal.tokWh || 1);
                    }

                    // Retrancher les consommations des valeurs spécifiées
                    let totalARetrancher = 0;
                    for (const cleARetrancher of type) {
                        const configARetrancher = desc.valeurs[cleARetrancher];
                        if (configARetrancher) {
                            if (configARetrancher.hc) {
                                const valActHC = releveActuel[cleARetrancher + '_hc'] || 0;
                                const valActHP = releveActuel[cleARetrancher + '_hp'] || 0;
                                const valPrecHC = relevePrecedent[cleARetrancher + '_hc'] || 0;
                                const valPrecHP = relevePrecedent[cleARetrancher + '_hp'] || 0;

                                const consoHC = calculerConsommationBasique(valActHC, valPrecHC, configARetrancher.type);
                                const consoHP = calculerConsommationBasique(valActHP, valPrecHP, configARetrancher.type);
                                totalARetrancher += (consoHC + consoHP) * (configARetrancher.tokWh || 1);
                            } else {
                                const valAct = releveActuel[cleARetrancher] || 0;
                                const valPrec = relevePrecedent[cleARetrancher] || 0;
                                totalARetrancher += calculerConsommationBasique(valAct, valPrec, configARetrancher.type) * (configARetrancher.tokWh || 1);
                            }
                        }
                    }

                    return consoTotal - totalARetrancher;
                }
            } else {
                return calculerConsommationBasique(valeurActuelle, valeurPrecedente, type);
            }
        }

        function calculerConsommationBasique(valeurActuelle, valeurPrecedente, type) {
            if (valeurPrecedente === undefined || valeurActuelle === undefined) {
                return 0;
            }

            if (type === "index") {
                return valeurActuelle - valeurPrecedente;
            } else if (type === "conso") {
                return valeurActuelle;
            }
            return 0;
        }

        function calculerConsommationJournaliere(conso, dateActuelle, datePrecedente) {
            if (!dateActuelle || !datePrecedente) {
                return 0;
            }

            const date1 = new Date(dateActuelle);
            const date2 = new Date(datePrecedente);
            const diffJours = Math.abs(date1 - date2) / (1000 * 60 * 60 * 24);

            if (diffJours > 0) {
                return conso / diffJours;
            } else {
                return 0;
            }
        }

        function calculerPourcentageHC(consoHC, consoHP) {
            const total = consoHC + consoHP;
            if (total > 0) {
                return (consoHC / total) * 100;
            } else {
                return 0;
            }
        }

        function calculerTotauxAnnuels() {
            const totauxParAnnee = {};

            let prix = null;
            // report correct prices for each record
            for (let i = compteurs.length-1; i >= 0 ; i--) {
                if (typeof compteurs[i].prix_hc !== "undefined") {
                    prix = compteurs[i];
                } else {
                    compteurs[i].prix = prix;
                }
            }

            // Parcourir les relevés pour calculer les consommations
            for (let i = 0; i < compteurs.length - 1; i++) {
                const releve = compteurs[i];
                if (!releve.date) {
                    continue;
                }

                let relevePrecedent = compteurs[i + 1];
                if (!relevePrecedent.date) {
                    relevePrecedent = compteurs[i + 2];
                }
                if (!relevePrecedent || !relevePrecedent.date) {
                    continue;
                }

                // Déterminer l'année fiscale (juillet-juin)
                const dateReleve = new Date(releve.date);
                const jourReleve = dateReleve.getDate();
                const moisReleve = dateReleve.getMonth() + 1; // Mois de 1 à 12
                const anneeReleve = dateReleve.getFullYear();

                // L'année fiscale commence en juillet
                let anneeFiscale;
                if (moisReleve < 7 || moisReleve == 7 && jourReleve < 15) {
                    anneeFiscale = anneeReleve - 1;
                } else {
                    anneeFiscale = anneeReleve;
                }
                const labelAnnee = `${anneeFiscale}-${anneeFiscale + 1}`;

                if (!totauxParAnnee[labelAnnee]) {
                    totauxParAnnee[labelAnnee] = {};
                    for (const cle of Object.keys(desc.valeurs)) {
                        totauxParAnnee[labelAnnee][cle] = 0;
                    }
                }

                // D'abord calculer les consommations des types simples (index, conso)
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    if (!Array.isArray(config.type)) {
                        let consoTotale = 0;

                        if (config.hc) {
                            // Compteur avec heures creuses/pleines
                            const valeurActuelleHC = releve[cle + '_hc'];
                            const valeurActuelleHP = releve[cle + '_hp'];
                            const valeurPrecedenteHC = relevePrecedent[cle + '_hc'];
                            const valeurPrecedenteHP = relevePrecedent[cle + '_hp'];

                            const consoHC = calculerConsommationBasique(valeurActuelleHC, valeurPrecedenteHC, config.type);
                            const consoHP = calculerConsommationBasique(valeurActuelleHP, valeurPrecedenteHP, config.type);
                            consoTotale = consoHC + consoHP;
                        } else {
                            // Compteur sans distinction HC/HP
                            const valeurActuelle = releve[cle];
                            const valeurPrecedente = relevePrecedent[cle];
                            consoTotale = calculerConsommationBasique(valeurActuelle, valeurPrecedente, config.type);
                        }

                        // Convertir en kWh et ajouter au total annuel
                        const tokWh = config.tokWh || 1;
                        const consoTotale_kWh = consoTotale * tokWh;
                        totauxParAnnee[labelAnnee][cle] += consoTotale_kWh;
                    }
                }
            }

            // Ensuite calculer les consommations des types tableau (après avoir tous les totaux)
            for (const labelAnnee of Object.keys(totauxParAnnee)) {
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    if (Array.isArray(config.type)) {
                        // Calculer en utilisant la logique de soustraction
                        const consoCalculee = calculerConsommation(null, null, config.type, config, null, null, totauxParAnnee, labelAnnee);
                        totauxParAnnee[labelAnnee][cle] = consoCalculee;
                    }
                }
            }

            return totauxParAnnee;
        }

        function genererTableauRecapitulatifAnnuel() {
            const totauxAnnuels = calculerTotauxAnnuels();

            if (Object.keys(totauxAnnuels).length === 0) {
                return null;
            }

            const table = document.createElement('table');
            table.style.marginBottom = '30px';

            // En-têtes avec groupes de colonnes
            const thead = document.createElement('thead');

            // Première ligne : groupes de colonnes
            const headerRow1 = document.createElement('tr');

            const thAnnee = document.createElement('th');
            thAnnee.textContent = 'Année (juillet-juin)';
            thAnnee.rowSpan = 2;
            headerRow1.appendChild(thAnnee);

            for (const [cle, config] of Object.entries(desc.valeurs)) {
                const thGroupe = document.createElement('th');
                thGroupe.textContent = config.nom;
                thGroupe.style.textAlign = 'center';
                thGroupe.style.backgroundColor = '#e9ecef';

                // Calculer le nombre de colonnes : kWh + kWh/m² + total (si activé)
                let nbColonnes = 2; // kWh, kWh/m²
                if (config.total !== false) {
                    nbColonnes++; // + total si activé
                }

                thGroupe.colSpan = nbColonnes;
                headerRow1.appendChild(thGroupe);
            }

            // Deuxième ligne : détails des colonnes
            const headerRow2 = document.createElement('tr');

            for (const [cle, config] of Object.entries(desc.valeurs)) {
                // kWh
                const thkWh = document.createElement('th');
                thkWh.textContent = 'kWh';
                thkWh.className = 'numeric';
                thkWh.style.fontSize = '0.9em';
                headerRow2.appendChild(thkWh);

                // kWh/m²
                const thkWhM2 = document.createElement('th');
                thkWhM2.textContent = 'kWh/m²';
                thkWhM2.className = 'numeric';
                thkWhM2.style.fontSize = '0.9em';
                headerRow2.appendChild(thkWhM2);

                // total (seulement si config.total !== false)
                if (config.total !== false) {
                    const thTotal = document.createElement('th');
                    thTotal.textContent = '% total';
                    thTotal.className = 'numeric';
                    thTotal.style.fontSize = '0.9em';
                    headerRow2.appendChild(thTotal);
                }
            }

            thead.appendChild(headerRow1);
            thead.appendChild(headerRow2);
            table.appendChild(thead);

            // Corps du tableau
            const tbody = document.createElement('tbody');

            // Trier les années par ordre décroissant (plus récente en premier)
            const anneesTriees = Object.keys(totauxAnnuels).sort().reverse();

            for (const annee of anneesTriees) {
                const row = document.createElement('tr');

                // Colonne année
                const anneeCell = document.createElement('td');
                anneeCell.textContent = annee;
                row.appendChild(anneeCell);

                // Calculer les totaux pour les totals selon la configuration
                const totauxPourRatios = {};
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    if (typeof config.total === 'string') {
                        // Si total est une string, c'est la clé du total à utiliser
                        const cleTotal = config.total;
                        if (!totauxPourRatios[cleTotal]) {
                            totauxPourRatios[cleTotal] = totauxAnnuels[annee][cleTotal] || 0;
                        }
                    }
                }

                // Colonnes des totaux avec détails
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    const total = totauxAnnuels[annee][cle] || 0;

                    // kWh
                    const cellkWh = document.createElement('td');
                    cellkWh.className = 'numeric';

                    // Ajouter la classe error si la valeur est négative
                    if (total < 0) {
                        cellkWh.className += ' error';
                    }

                    cellkWh.textContent = total.toFixed(2);
                    row.appendChild(cellkWh);

                    // kWh/m²
                    const cellkWhM2 = document.createElement('td');
                    cellkWhM2.className = 'numeric';
                    const kWhParM2 = total / desc.surface;
                    cellkWhM2.textContent = kWhParM2.toFixed(2);
                    row.appendChild(cellkWhM2);

                    // Total (seulement si config.total !== false)
                    if (config.total !== false) {
                        const cellRatio = document.createElement('td');
                        cellRatio.className = 'numeric percentage';

                        if (typeof config.total === 'string') {
                            // Utiliser la valeur spécifiée comme total pour le total
                            const totalPourRatio = totauxPourRatios[config.total] || 0;
                            if (totalPourRatio > 0) {
                                const ratio = (total / totalPourRatio) * 100;
                                cellRatio.textContent = `${ratio.toFixed(1)}%`;
                            } else {
                                cellRatio.textContent = '-';
                            }
                        }

                        row.appendChild(cellRatio);
                    }
                }

                tbody.appendChild(row);
            }

            table.appendChild(tbody);
            return table;
        }

        function genererGraphiqueAnnuel() {
            const totauxAnnuels = calculerTotauxAnnuels();

            if (Object.keys(totauxAnnuels).length === 0) {
                return;
            }

            const ctx = document.getElementById('graphiqueAnnuel').getContext('2d');

            // Préparer les données
            const annees = Object.keys(totauxAnnuels).sort();
            const datasets = [];

            // Créer un dataset pour chaque valeur
            for (const [cle, config] of Object.entries(desc.valeurs)) {
                const donnees = annees.map(annee => totauxAnnuels[annee][cle] || 0);

                datasets.push({
                    label: config.nom,
                    data: donnees,
                    borderColor: config.couleur || '#6c757d',
                    backgroundColor: config.couleur || '#6c757d',
                    borderWidth: 2,
                    fill: false
                });
            }

            // Créer le graphique
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: annees,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Consommation (kWh)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Année (Juillet-Juin)'
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Évolution des consommations annuelles'
                        },
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.parsed.y.toFixed(2)} kWh`;
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        function genererTableauxBilans() {
            const bilansDiv = document.getElementById('bilans');
            bilansDiv.innerHTML = '';

            // Générer le tableau récapitulatif annuel
            const tableauAnnuel = genererTableauRecapitulatifAnnuel();
            if (tableauAnnuel) {
                const titreAnnuel = document.createElement('h2');
                titreAnnuel.textContent = 'Récapitulatif annuel';
                titreAnnuel.style.marginTop = '0';
                titreAnnuel.style.marginBottom = '15px';
                titreAnnuel.style.color = '#333';
                bilansDiv.appendChild(titreAnnuel);
                bilansDiv.appendChild(tableauAnnuel);
            }

            // Générer le tableau mensuel
            const titreMensuel = document.createElement('h2');
            titreMensuel.textContent = 'Détail mensuel';
            titreMensuel.style.marginBottom = '15px';
            titreMensuel.style.color = '#333';
            bilansDiv.appendChild(titreMensuel);

            // Créer un seul tableau
            const table = document.createElement('table');

            // En-têtes du tableau avec groupes
            const thead = document.createElement('thead');

            // Première ligne d'en-têtes : noms des compteurs
            const headerRow1 = document.createElement('tr');

            // Première colonne : Période
            const thPeriode = document.createElement('th');
            thPeriode.textContent = 'Période';
            thPeriode.rowSpan = 2;
            headerRow1.appendChild(thPeriode);

            // Pour chaque compteur, créer un groupe de colonnes
            for (const [cle, config] of Object.entries(desc.valeurs)) {
                const thGroupe = document.createElement('th');
                // Afficher l'unité source seulement si différente de kWh
                thGroupe.textContent = `${config.nom}`;
                thGroupe.style.textAlign = 'center';
                thGroupe.style.backgroundColor = '#e9ecef';

                // Calculer le nombre de colonnes pour ce compteur
                let nbColonnes = 2; // mensuelle + journalière
                if (config.hc) {
                    nbColonnes++; // + % HC si applicable
                }

                thGroupe.colSpan = nbColonnes;
                headerRow1.appendChild(thGroupe);
            }            // Deuxième ligne d'en-têtes : détails des colonnes
            const headerRow2 = document.createElement('tr');

            for (const [cle, config] of Object.entries(desc.valeurs)) {
                // Consommation mensuelle
                const thMensuel = document.createElement('th');
                thMensuel.textContent = 'kWh';
                thMensuel.style.fontSize = '0.9em';
                headerRow2.appendChild(thMensuel);

                // Consommation journalière
                const thJour = document.createElement('th');
                thJour.textContent = 'kWh/j';
                thJour.style.fontSize = '0.9em';
                headerRow2.appendChild(thJour);

                // Pourcentage heures creuses (seulement si applicable)
                if (config.hc) {
                    const thHC = document.createElement('th');
                    thHC.textContent = '% HC';
                    thHC.style.fontSize = '0.9em';
                    headerRow2.appendChild(thHC);
                }
            }            thead.appendChild(headerRow1);
            thead.appendChild(headerRow2);
            table.appendChild(thead);

            // Corps du tableau
            const tbody = document.createElement('tbody');

            // Parcourir les relevés avec dates (plus récent en premier dans le tableau)
            for (let i = 0; i < compteurs.length - 1; i++) {
                const releve = compteurs[i];
                if (!releve.date) {
                    continue;
                }

                const relevePrecedent = compteurs[i + 1];
                const row = document.createElement('tr');

                // Première colonne : Date de la période
                const periodeCell = document.createElement('td');
                periodeCell.textContent = releve.date;
                row.appendChild(periodeCell);

                // Pour chaque compteur, ajouter les colonnes
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    let consoTotale = 0;
                    let consoHC = 0;
                    let consoHP = 0;

                    if (Array.isArray(config.type)) {
                        // Type tableau : calculer par soustraction
                        consoTotale = calculerConsommation(null, null, config.type, config, releve, relevePrecedent);
                    } else if (config.hc) {
                        // Compteur avec heures creuses/pleines
                        const valeurActuelleHC = releve[cle + '_hc'] || 0;
                        const valeurActuelleHP = releve[cle + '_hp'] || 0;
                        const valeurPrecedenteHC = relevePrecedent[cle + '_hc'] || 0;
                        const valeurPrecedenteHP = relevePrecedent[cle + '_hp'] || 0;

                        consoHC = calculerConsommationBasique(valeurActuelleHC, valeurPrecedenteHC, config.type);
                        consoHP = calculerConsommationBasique(valeurActuelleHP, valeurPrecedenteHP, config.type);
                        consoTotale = consoHC + consoHP;
                    } else {
                        // Compteur sans distinction HC/HP
                        const valeurActuelle = releve[cle] || 0;
                        const valeurPrecedente = relevePrecedent[cle] || 0;
                        consoTotale = calculerConsommationBasique(valeurActuelle, valeurPrecedente, config.type);
                    }

                    // Convertir en kWh en utilisant tokWh
                    const tokWh = config.tokWh || 1;
                    const consoTotale_kWh = consoTotale * tokWh;

                    // Consommation mensuelle en kWh
                    const consoPeriodeCell = document.createElement('td');
                    consoPeriodeCell.className = 'numeric';

                    // Ajouter la classe error si la valeur est négative
                    if (consoTotale_kWh < 0) {
                        consoPeriodeCell.classList.add('error');
                    }

                    consoPeriodeCell.innerHTML = `${consoTotale_kWh.toFixed(2)}`;

                    // Ajouter un tooltip pour les compteurs avec HC/HP
                    if (config.hc && !Array.isArray(config.type)) {
                        const consoHC_kWh = consoHC * tokWh;
                        const consoHP_kWh = consoHP * tokWh;
                        consoPeriodeCell.title = `HC: ${consoHC_kWh.toFixed(2)} kWh\nHP: ${consoHP_kWh.toFixed(2)} kWh`;
                    }

                    row.appendChild(consoPeriodeCell);

                    // Consommation journalière en kWh
                    const consoJourCell = document.createElement('td');
                    consoJourCell.className = 'numeric';
                    const consoJour = calculerConsommationJournaliere(consoTotale, releve.date, relevePrecedent.date);
                    const consoJour_kWh = consoJour * tokWh;
                    consoJourCell.innerHTML = `${consoJour_kWh.toFixed(2)}`;
                    row.appendChild(consoJourCell);

                    // Pourcentage heures creuses (seulement si applicable)
                    if (config.hc) {
                        const pctHCCell = document.createElement('td');
                        pctHCCell.className = 'numeric percentage';
                        if (consoTotale > 0) {
                            const pctHC = calculerPourcentageHC(consoHC, consoHP);
                            pctHCCell.textContent = `${pctHC.toFixed(1)}%`;
                        } else {
                            pctHCCell.textContent = '-';
                        }
                        row.appendChild(pctHCCell);
                    }
                }

                tbody.appendChild(row);
            }

            table.appendChild(tbody);
            bilansDiv.appendChild(table);
        }

        // Générer le tableau et le graphique au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            genererGraphiqueAnnuel();
            genererTableauxBilans();
        });
    </script>
</body>
</html>
