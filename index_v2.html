    <script>
        function genererTableauRecapitulatifAnnuel() {
            // Utiliser les données calculées dans la variable annees par la fonction preparer
            if (!annees || Object.keys(annees).length === 0) {
                return null;
            }

            const table = document.createElement('table');
            table.className = 'table-annual';

            // En-têtes avec groupes de colonnes
            const thead = document.createElement('thead');

            // Première ligne : groupes de colonnes
            const headerRow1 = document.createElement('tr');

            const thAnnee = document.createElement('th');
            thAnnee.textContent = 'Année';
            thAnnee.rowSpan = 2;
            headerRow1.appendChild(thAnnee);

            for (const [cle, config] of Object.entries(desc.valeurs)) {
                const thGroupe = document.createElement('th');
                thGroupe.textContent = config.nom;
                thGroupe.className = 'header-group';

                // Calculer le nombre de colonnes : kWh + kWh/m² (si surface) + kWh/pers (si pers) + total (si activé) + prix (si activé)
                let nbColonnes = 1;
                if (config.surface) {
                    nbColonnes++;
                }
                if (config.pers) {
                    nbColonnes++;
                }
                if (config.total) {
                    nbColonnes++;
                }
                if (config.prix) {
                    nbColonnes++; // + prix si activé
                }

                thGroupe.colSpan = nbColonnes;
                headerRow1.appendChild(thGroupe);
            }

            // Deuxième ligne : détails des colonnes
            const headerRow2 = document.createElement('tr');

            for (const [cle, config] of Object.entries(desc.valeurs)) {
                const thkWh = document.createElement('th');
                thkWh.textContent = 'kWh';
                thkWh.className = 'numeric header-detail';
                headerRow2.appendChild(thkWh);

                if (config.surface) {
                    const thkWhM2 = document.createElement('th');
                    thkWhM2.textContent = 'kWh/m²';
                    thkWhM2.className = 'numeric header-detail';
                    headerRow2.appendChild(thkWhM2);
                }

                if (config.pers) {
                    const thkWhPers = document.createElement('th');
                    thkWhPers.textContent = 'kWh/pers';
                    thkWhPers.className = 'numeric header-detail';
                    headerRow2.appendChild(thkWhPers);
                }

                if (config.total) {
                    const thTotal = document.createElement('th');
                    thTotal.textContent = 'ratio';
                    thTotal.className = 'numeric header-detail';
                    headerRow2.appendChild(thTotal);
                }

                if (config.prix) {
                    const thPrix = document.createElement('th');
                    thPrix.textContent = '€';
                    thPrix.className = 'numeric header-detail';
                    headerRow2.appendChild(thPrix);
                }
            }

            thead.appendChild(headerRow1);
            thead.appendChild(headerRow2);
            table.appendChild(thead);

            // Corps du tableau
            const tbody = document.createElement('tbody');

            // Trier les années par ordre décroissant (plus récente en premier)
            const anneesTriees = Object.keys(annees).sort().reverse();

            for (const annee of anneesTriees) {
                const periode = annees[annee];
                const row = document.createElement('tr');

                // Colonne année
                const anneeCell = document.createElement('td');
                anneeCell.textContent = periode.nom;
                row.appendChild(anneeCell);

                // Calculer les totaux pour les ratios selon la configuration
                const totauxPourRatios = {};
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    if (typeof config.total === 'string') {
                        // Si total est une string, c'est la clé du total à utiliser
                        const cleTotal = config.total;
                        if (!totauxPourRatios[cleTotal] && periode.consos[cleTotal]) {
                            totauxPourRatios[cleTotal] = periode.consos[cleTotal].total || 0;
                        }
                    }
                }

                // Colonnes des totaux avec détails
                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    const total = periode.consos[cle] ? periode.consos[cle].total : 0;

                    // kWh
                    const cellkWh = document.createElement('td');
                    cellkWh.className = 'numeric';

                    // Ajouter la classe error si la valeur est négative
                    if (total < 0) {
                        cellkWh.className += ' error';
                    }

                    cellkWh.textContent = total.toFixed(0);

                    // Ajouter un tooltip avec l'info si elle existe
                    const conso = periode.consos[cle];
                    if (conso && conso.info && conso.info.trim() !== '') {
                        cellkWh.title = conso.info;
                    }

                    row.appendChild(cellkWh);

                    if (config.surface) {
                        const cellkWhM2 = document.createElement('td');
                        cellkWhM2.className = 'numeric';
                        const kWhParM2 = periode.consos[cle] ? periode.consos[cle].parm2 : 0;
                        cellkWhM2.textContent = kWhParM2.toFixed(1);
                        row.appendChild(cellkWhM2);
                    }

                    if (config.pers) {
                        const cellkWhPers = document.createElement('td');
                        cellkWhPers.className = 'numeric';
                        const kWhParPers = periode.consos[cle] ? periode.consos[cle].parpers : 0;
                        cellkWhPers.textContent = kWhParPers.toFixed(1);
                        row.appendChild(cellkWhPers);
                    }

                    if (config.total) {
                        const cellRatio = document.createElement('td');
                        cellRatio.className = 'numeric percentage';

                        if (typeof config.total === 'string') {
                            // Utiliser la valeur spécifiée comme total pour le ratio

        class Conso {
            constants; // prices, surface...
            valeur;
            total;
            totalHC;
            totalHP;
            journalier;
            ratioHC; //
            jours; // nombre de jours de la période observée
            brut; // valeur brute si conversion d'unité
            info; // pour l'info bulle
            prix; // prix en fonction du cours
            parm2; // per surface unit ratio
            parpers; // per person

            constructor(constants, valeur) {
                this.constants = constants;
                this.valeur = valeur;
                this.total = 0;
                this.totalHC = 0;
                this.totalHP = 0;
                this.journalier = 0;
                this.ratioHC = 0;
                this.jours = 0;
                this.prix = 0;
                this.brut = 0;
                this.parm2 = 0;
                this.parpers = 0;
                this.info = "";
            }

            update() {
                if (this.valeur.hc) {
                    this.info = `Heures pleines : ${this.totalHP} ${this.valeur.unite}\nHeures creuses : ${this.totalHC} ${this.valeur.unite}`;
                } else {
                    this.info = `${this.brut.toFixed(1)} ${this.valeur.unite}`;
                }
                this.ratioHC = this.totalHC / this.total;
                this.parm2 = this.total / this.constants.surface;
                this.parpers = this.total / this.constants.personnes;
            }

            ajouter(conso) {
                this.constants = conso.constants;
                this.total += conso.total;
                this.totalHP += conso.totalHP;
                this.totalHC += conso.totalHC;
                this.jours += conso.jours;
                this.journalier += conso.total / conso.jours;
                this.prix += conso.prix;

                this.brut += conso.brut;
                this.update();
            }

            retirer(conso) {
                this.total -= conso.total;
                this.totalHP -= conso.totalHP;
                this.totalHC -= conso.totalHC;
                this.journalier -= conso.total / conso.jours;
                this.prix -= conso.prix;
                this.brut -= conso.brut;
                this.update();
            }

            multiplier(facteur) {
                this.total *= facteur;
                this.totalHP *= facteur;
                this.totalHC *= facteur;
                this.journalier *= facteur;
            }
        }

        class Periode {
            constants;
            nom;
            date;
            consos; // {valeur1: Conso, valeur2: Conso}

            constructor(nom, date, constants) {
                this.nom = nom;
                this.date = date;
                this.consos = {};
                this.constants = constants;
            }

            /*
             total: {    nom: "Total",       unite: "kWh",   type: "index",  hc: true,   tokWh: 1,   total: false,       couleur: "#007bff"},
             divers: {   nom: "Divers",      unite: "kWh",   type: ["chauf","ecs","ev"],   hc: false,  tokWh: 1,    total: "total",  couleur: "#ffc107"},
             bois: {     nom: "Bois",        unite: "kg",    type: "conso",  hc: false,  tokWh: 4.1, total: false,       couleur: "#6c757d"}

            {date: "2025-09-01", total_hc: 29157, total_hp: 30067, chauf_hc: 24624, chauf_hp: 30706, ev_hp: 216, ev_hc: 0, ecs_hc: 13731, ecs_hp: 0, bois: 0},
            */
            ajouterReleve (releve, precedent, nom, valeur) {
                let c = new Conso(releve.constants, valeur);
                // calcul conso en fonction du type
                if (valeur.type === "conso") {
                    c.total = releve[nom];
                    c.prix = c.total * releve.constants[valeur.unite];
                    c.info = `${c.total} ${valeur.unite}`;
                } else if (valeur.type === "index") {
                    if (valeur.hc) {
                        // start either from previous index or from forced one in _init value
                        c.totalHC = releve[nom+"_hc"] - (typeof releve[nom+"_hc_init"] != "undefined" ? releve[nom+"_hc_init"] : precedent[nom+"_hc"]);
                        c.totalHP = releve[nom+"_hp"] - (typeof releve[nom+"_hp_init"] != "undefined" ? releve[nom+"_hp_init"] : precedent[nom+"_hp"]);
                        c.total = c.totalHC + c.totalHP;
                        c.ratioHC = c.totalHC / c.total;
                        c.info = `Heures pleines : ${c.totalHP} ${valeur.unite}\nHeures creuses : ${c.totalHC} ${valeur.unite}`;
                        c.prix = c.totalHC * releve.constants[valeur.unite + "_hc"] + c.totalHP * releve.constants[valeur.unite + "_hp"];
                    } else {
                        c.total = releve[nom] - (typeof [nom+"init"] != "undefined" ? releve[nom+"init"] : precedent[nom]);;
                        c.prix = c.totalHP * releve.constants[valeur.unite + "_hp"];
                    }
                } else if (valeur.type == "mesure") {
                    c.total = releve[nom];
                    c.info = `${c.total} ${valeur.unite}`;
                } else if (valeur.type.length) {
                    if (valeur.type.indexOf("=") !== -1) {
                        // perform a regression on a yearly basis
                    } else {
                        // simple computation
                        valeur.type.forEach((sub) => {
                            if (sub.indexOf("-") === 0) {
                                c.retirer(this.consos[sub.substring(1)]);
                            } else {
                                c.ajouter(this.consos[sub]);
                            }
                        });
                    }
                }
                c.jours = (releve.fin.getTime() - precedent.fin.getTime()) / 86400000;

                if (valeur.prix && valeur.prix.length > 0) {
                    valeur.prix.forEach(toAdd => {
                        c.prix += releve.constants[toAdd];
                    });
                }

                // conversion en kWh si nécessaire, pas de gestion des heures creuses
                if (typeof valeur.tokWh != "undefined") {
                    c.brut = c.total;
                    c.info = `${c.brut} ${valeur.unite}`;
                    c.total = c.total * valeur.tokWh;
                }

                c.journalier = c.total / c.jours;
                c.constants = releve.constants;

                this.consos[nom] = c;
            }

            ajouter(periode) {
                for (const [nom, conso] of Object.entries(periode.consos)) {
                    if (!this.consos[nom]) {
                        this.consos[nom] = new Conso(periode.constants, conso.valeur);
                    }
                    this.consos[nom].ajouter(conso);
                }
            }
        }

        /**
         * Compute the linear regression to best match targets from inputs on provided inputs.
         * The forumula is assumed to be for each item: target = A*inputs[label1] + B*inputs[label2] + ... + Z
         * Where A, B, ... are coefficients and Z is a constant
         * @param targets array of numbers containing the target values to match
         * @param inputs array of objects containing raw values
         * @param labels array of properties to use from inputs
         * @return an array of the coefficients [A, B, ... , Z] (this array has the same number of items than labels + 1 for the constant)
         */
        function linearRegression(targets, inputs, labels) {
            const n = targets.length;
            const k = labels.length;

            // construct matrix X (n x (k+1)) and vector y (n x 1)
            // X contains input values with a column of 1s for the constant term
            const X = [];
            const y = targets;

            for (let i = 0; i < n; i++) {
                const row = [];
                for (let j = 0; j < k; j++) {
                    row.push(inputs[i][labels[j]] || 0);
                }
                row.push(1); // constant term
                X.push(row);
            }

            // compute X^T * X
            const XtX = [];
            for (let i = 0; i < k + 1; i++) {
                XtX[i] = [];
                for (let j = 0; j < k + 1; j++) {
                    let sum = 0;
                    for (let row = 0; row < n; row++) {
                        sum += X[row][i] * X[row][j];
                    }
                    XtX[i][j] = sum;
                }
            }

            // compute X^T * y
            const Xty = [];
            for (let i = 0; i < k + 1; i++) {
                let sum = 0;
                for (let row = 0; row < n; row++) {
                    sum += X[row][i] * y[row];
                }
                Xty[i] = sum;
            }

            // solve (X^T * X) * beta = X^T * y using Gaussian elimination
            const augmented = XtX.map((row, i) => [...row, Xty[i]]);

            // forward elimination
            for (let i = 0; i < k + 1; i++) {
                // find pivot
                let maxRow = i;
                for (let row = i + 1; row < k + 1; row++) {
                    if (Math.abs(augmented[row][i]) > Math.abs(augmented[maxRow][i])) {
                        maxRow = row;
                    }
                }

                // swap rows
                [augmented[i], augmented[maxRow]] = [augmented[maxRow], augmented[i]];

                // eliminate column
                for (let row = i + 1; row < k + 1; row++) {
                    const factor = augmented[row][i] / augmented[i][i];
                    for (let col = i; col < k + 2; col++) {
                        augmented[row][col] -= factor * augmented[i][col];
                    }
                }
            }

            // back substitution
            const beta = new Array(k + 1);
            for (let i = k; i >= 0; i--) {
                beta[i] = augmented[i][k + 1];
                for (let j = i + 1; j < k + 1; j++) {
                    beta[i] -= augmented[i][j] * beta[j];
                }
                beta[i] /= augmented[i][i];
            }

            // return coefficients for each label plus constant at the end
            return beta;
        }

        /** Transforme les données des compteurs en releves pour simplifier le traitement */
        function preparer() {
            // order by ascending dates and integrate current prices to each measure
            let releves = [];
            let lastConstants = {};
            for (let i = compteurs.length-1; i >= 0 ; i--) {
                if (typeof compteurs[i].date === "undefined") {
                    let newConstants = JSON.parse(JSON.stringify(compteurs[i]));
                    for (const [k, v] of Object.entries(lastConstants)) {
                        if (typeof newConstants[k] === "undefined") {
                            newConstants[k] = v;
                        }
                    }
                    lastConstants = newConstants;
                } else {
                    compteurs[i].constants = lastConstants;
                    compteurs[i].fin=new Date(compteurs[i].date);
                    releves.push(compteurs[i]);
                }
            }

            console.log("releves", releves);

            // build list of months
            mois = [];
            perYear = {};
            for (let i = 1; i < releves.length; i++) {
                let date = new Date(releves[i].date);
                date.setMonth(date.getMonth()-1);
                let currentYear = date.getFullYear();

                let p = new Periode(`${currentYear}-${(date.getMonth()+1).toLocaleString('fr-FR', {minimumIntegerDigits: 2})}`, date, releves[i].constants);

                for (const [cle, config] of Object.entries(desc.valeurs)) {
                    p.ajouterReleve(releves[i], releves[i-1], cle, config);
